# {{FLASK_HOST}} - Flask server hostname or IP (default: 127.0.0.1)
# {{FLASK_PORT}} - Flask server port (default: 5000)
# {{SERVER_NAME}} - Your domain name (default: _ for any)
# {{PROJECT_PATH}} - Full path to egghunt-event directory
# {{LISTEN_PORT}} - Port nginx listens on (default: 80)
# {{PROXY_TIMEOUT}} - Proxy timeout in seconds (default: 30s)

upstream egg_hunt {
    server {{FLASK_HOST}}:{{FLASK_PORT}};
}

server {
    listen {{LISTEN_PORT}};
    server_name {{SERVER_NAME}};

    client_max_body_size 8M;
 
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss;
    gzip_min_length 1000;

    location /assets/ {
        alias {{PROJECT_PATH}}/src/assets/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
    
    location ~ ^/(create-egg|my-eggs|rules)?/?$ {
        alias {{PROJECT_PATH}}/src/;
        try_files $uri $uri/ index.html;
    }

    location /api/ {
        proxy_pass http://egg_hunt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout {{PROXY_TIMEOUT}};
    }

    location /callback/ {
        proxy_pass http://egg_hunt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location / {
        proxy_pass http://egg_hunt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
